{% extends 'shared/base.html' %}{% block content %}<div class="d-flex justify-content-between align-items-center mb-4"><h1>Executive Dashboard</h1><span class="badge text-bg-success">Production-ready foundation</span></div><div class="row g-3">{% for name, value in kpis.items() %}<div class="col-md-6 col-xl-3"><div class="card kpi-card shadow-sm"><div class="card-body"><div class="text-muted small">{{ name }}</div><div class="fs-3 fw-bold">₹{{ '{:,.2f}'.format(value) }}</div></div></div></div>{% endfor %}</div><div class="row g-3 mt-2"><div class="col-lg-6"><div class="card"><div class="card-body"><h2 class="h5">Cash Flow</h2><canvas id="cashFlowChart"></canvas></div></div></div><div class="col-lg-6"><div class="card"><div class="card-body"><h2 class="h5">Portfolio Growth</h2><canvas id="growthChart"></canvas></div></div></div></div>{% endblock %}
