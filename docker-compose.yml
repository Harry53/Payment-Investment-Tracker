services:
  web:
    build: .
    env_file: .env.example
    volumes:
      - sqlite_data:/app/instance
      - app_logs:/app/app/logs
    depends_on: []
  nginx:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [web]
volumes:
  sqlite_data:
  app_logs:
