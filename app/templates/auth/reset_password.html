{% extends 'shared/base.html' %}{% block content %}<div class="auth-card card shadow-sm mx-auto"><div class="card-body"><h1 class="h3">Reset password</h1><form method="post">{{ form.hidden_tag() }}{% for field in [form.password, form.confirm_password] %}<div class="mb-3">{{ field.label(class='form-label') }}{{ field(class='form-control') }}</div>{% endfor %}{{ form.submit(class='btn btn-primary') }}</form></div></div>{% endblock %}
